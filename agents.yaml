  # Kiro CLI (AWS Kiro Studio's headless chat mode). `kiro-cli chat
  # --no-interactive --trust-tools=fs_read "<prompt>"` runs the agent read-only
  # (fs_read only, no writes/exec), which is what /consensus terminal reviewers
  # need. Requires prior `kiro-cli login`; state at ~/.aws/sso equivalent.
  - id: kiro
    provider: kiro
    model: default
    tier: strong
    tags: [agentic]
    auth: "cli:kiro-cli"
    transports:
      edit_exists: "kiro-cli chat --no-interactive --trust-tools=fs_read"

  # ============ Primary orchestrator (subscription CLI) ============
  # These are strong-tier agentic CLIs backed by an operator subscription — not
  # API keys. `pick_agents` excludes strong-tier by default (weak-only filter),
  # so they are reached only via an explicit `dispatch <id>` call, typically as
  # the primary-orchestrator role or as `escalate_to_pro: true` on a weak-tier
  # dispatch that failed. Which of the two is "primary" is decided by the
  # consumer (mrrlin will make this operator-configurable in a later slice);
  # both are registered here so either can serve.
  # Codex family — subscription-backed, two tiers so `escalate_to_pro` has a
  # target. `codex` (default weak-strong) works on every Codex plan; `codex-pro`
  # picks the strongest model on your plan via `-m gpt-5.4-codex`.
  - id: codex
    provider: openai
    model: gpt-5.2-codex
    tier: strong
    tags: []
    auth: "cli:codex"
    usage_url: "https://platform.openai.com/usage"
    transports:
      edit_exists: "codex exec --skip-git-repo-check"

  - id: codex-pro
    provider: openai
    model: gpt-5.4-codex
    tier: strong
    tags: [reasoning]
    auth: "cli:codex"
    usage_url: "https://platform.openai.com/usage"
    transports:
      edit_exists: "codex exec --skip-git-repo-check -m gpt-5.4-codex"

  # Claude family — subscription-backed, two tiers. `claude-opus` is the
  # strongest, `claude-sonnet` (below) is weak-tier for the atomic-executor
  # pool + `/consensus` terminal picks.
  - id: claude-opus
    provider: anthropic
    model: claude-opus-4-7
    tier: strong
    tags: []
    auth: "cli:claude"
    usage_url: "https://console.anthropic.com/settings/usage"
    transports:
      edit_exists: "env -u ANTHROPIC_BASE_URL -u ANTHROPIC_API_KEY claude --print --model claude-opus-4-7"

  # Weak-tier Sonnet — same Claude subscription, cheaper model. Included in
  # default `pick_agents` runs (weak filter passes it), so `dispatch` /
  # `/consensus` terminal-picks and the atomic-executor workload can route to
  # Claude via subscription without burning Opus tokens.
  - id: claude-sonnet
    provider: anthropic
    model: claude-sonnet-5
    tier: weak
    tags: [quick]
    auth: "cli:claude"
    preference_order: 20
    usage_url: "https://console.anthropic.com/settings/usage"
    transports:
      edit_exists: "env -u ANTHROPIC_BASE_URL -u ANTHROPIC_API_KEY claude --print --model claude-sonnet-5"
